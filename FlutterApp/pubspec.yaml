name: chat_with_files
description: Chat application with file sharing support
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # HTTP & Networking
  dio: ^5.4.0
  http: ^1.1.0

  # SignalR
  signalr_netcore: ^1.3.2

  # File Handling
  file_picker: ^8.0.0
  path_provider: ^2.1.2
  mime: ^1.0.4

  # Local Database
  drift: ^2.14.1
  sqlite3_flutter_libs: ^0.5.18
  shared_preferences: ^2.2.2

  # UI Components
  intl: ^0.19.0

  # Permissions
  permission_handler: ^11.2.0

  # Utils
  uuid: ^4.3.3
  path: ^1.8.3
  crypto: ^3.0.3
  connectivity_plus: ^5.0.2

  # Dependency Injection
  get_it: ^7.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  drift_dev: ^2.14.1
  build_runner: ^2.4.8
  mocktail: ^1.0.2

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
